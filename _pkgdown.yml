url: https://jdenn0514.github.io/surveyweights/
template:
  bootstrap: 5

reference:
  - title: Calibration
    desc: >
      Functions for calibrating survey weights to known population totals.
    contents:
      - calibrate
      - rake
      - poststratify
  - title: Nonresponse Adjustment
    desc: >
      Functions for adjusting survey weights for unit nonresponse.
    contents:
      - adjust_nonresponse
  - title: Diagnostics
    desc: >
      Functions for assessing the distribution and quality of survey weights.
    contents:
      - effective_sample_size
      - weight_variability
      - summarize_weights
